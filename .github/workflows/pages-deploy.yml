name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "firmware/component/tvbgone_core/**"
      - "launchpad/**"
      - ".github/workflows/pages-deploy.yml"

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware (ESP-IDF v5.5.1, esp32c3)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.1
          target: esp32c3
          path: firmware/component/tvbgone_core/examples/tvbgone_esp32c3_supermini
          command: idf.py set-target esp32c3 build

      - name: Merge binaries into a single flashable image
        run: |
          pip install esptool --quiet
          BUILD=firmware/component/tvbgone_core/examples/tvbgone_esp32c3_supermini/build
          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 2MB \
            -o "${BUILD}/tvbgone_esp32c3.bin" \
            0x0     "${BUILD}/bootloader/bootloader.bin" \
            0x8000  "${BUILD}/partition_table/partition-table.bin" \
            0x10000 "${BUILD}/tvbgone_esp32c3_supermini.bin"

      - name: Stage GitHub Pages content
        run: |
          mkdir -p pages-staging
          cp firmware/component/tvbgone_core/examples/tvbgone_esp32c3_supermini/build/tvbgone_esp32c3.bin pages-staging/
          cp launchpad/config.toml pages-staging/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-staging

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
