name: tvbgone_core_publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install component manager CLI
        run: python -m pip install --upgrade idf-component-manager

      - name: Validate component metadata
        working-directory: firmware/component/tvbgone_core
        run: |
          test -f idf_component.yml
          test -f README.md
          test -f LICENSE
          test -d examples
          compote component pack .

      - name: Upload component
        working-directory: firmware/component/tvbgone_core
        env:
          IDF_COMPONENT_API_TOKEN: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
        run: compote component upload .
